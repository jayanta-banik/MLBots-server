name: frontend-build

on:
  push:
    branches:
      - master
    paths:
      - frontend/**
      - admin/**
      - .github/workflows/frontend-build.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --non-interactive

      - name: Build frontend into root static folder
        working-directory: frontend
        run: yarn build

      - name: Commit generated static assets
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh frontend build output"
          add_options: "-A"
          file_pattern: "static/frontend/build"
