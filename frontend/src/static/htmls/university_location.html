<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>US University Rankings Dashboard</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 1000;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.3px;
    }

    header .subtitle {
      font-size: 13px;
      color: #6b7280;
    }

    header .stats-bar {
      margin-left: auto;
      display: flex;
      gap: 20px;
      align-items: center;
    }

    header .stat {
      text-align: center;
    }

    header .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #a78bfa;
    }

    header .stat-label {
      font-size: 11px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    #map {
      flex: 1;
      background: #1a1d27;
    }

    .sidebar {
      width: 320px;
      background: #1a1d27;
      border-left: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-section {
      padding: 16px;
      border-bottom: 1px solid #2d3148;
    }

    .sidebar-section h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .search-box {
      position: relative;
    }

    .search-box input {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 8px;
      padding: 9px 12px 9px 36px;
      font-size: 13px;
      color: #e2e8f0;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box input:focus {
      border-color: #6366f1;
    }

    .search-box input::placeholder { color: #4b5563; }

    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #4b5563;
    }

    .filter-row {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .filter-chip {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
      user-select: none;
    }

    .filter-chip:hover { opacity: 0.8; }
    .filter-chip.active { border-color: currentColor; }

    .legend {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #9ca3af;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .shortlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .shortlist-count {
      background: #6366f1;
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 12px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: rgba(239,68,68,0.1); }

    .shortlist-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 16px;
    }

    .shortlist-scroll::-webkit-scrollbar { width: 4px; }
    .shortlist-scroll::-webkit-scrollbar-track { background: transparent; }
    .shortlist-scroll::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 2px; }

    .shortlist-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 120px;
      color: #4b5563;
      font-size: 13px;
      text-align: center;
      gap: 8px;
    }

    .shortlist-empty svg { opacity: 0.4; }

    .shortlist-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid #1f2335;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .shortlist-item:last-child { border-bottom: none; }

    .shortlist-rank {
      font-size: 11px;
      font-weight: 700;
      color: #6b7280;
      min-width: 36px;
      padding-top: 1px;
    }

    .shortlist-info { flex: 1; min-width: 0; }

    .shortlist-name {
      font-size: 13px;
      color: #e2e8f0;
      font-weight: 500;
      line-height: 1.3;
      word-break: break-word;
    }

    .shortlist-city {
      font-size: 11px;
      color: #6b7280;
      margin-top: 2px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .remove-btn:hover { color: #ef4444; }

    .export-btn {
      margin: 12px 16px;
      padding: 10px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      width: calc(100% - 32px);
      transition: background 0.15s;
    }

    .export-btn:hover { background: #5558e3; }
    .export-btn:disabled { background: #2d3148; color: #4b5563; cursor: default; }

    /* Leaflet overrides */
    .leaflet-container { background: #1a2744 !important; }

    .leaflet-popup-content-wrapper {
      background: #1a1d27 !important;
      border: 1px solid #2d3148 !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      color: #e2e8f0 !important;
      padding: 0 !important;
    }

    .leaflet-popup-content {
      margin: 0 !important;
      min-width: 220px;
    }

    .leaflet-popup-tip { background: #1a1d27 !important; }
    .leaflet-popup-close-button { color: #6b7280 !important; top: 6px !important; right: 6px !important; }

    .popup-content {
      padding: 14px 16px;
    }

    .popup-rank {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .popup-name {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 6px;
    }

    .popup-city {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .popup-btn {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .popup-btn.add {
      background: #6366f1;
      color: white;
    }

    .popup-btn.add:hover { background: #5558e3; }

    .popup-btn.remove {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
      border: 1px solid rgba(239,68,68,0.3);
    }

    .popup-btn.remove:hover { background: rgba(239,68,68,0.25); }

    .tier-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

    </div>

    <div class="shortlist-scroll" id="shortlist-scroll">

      </div>
    </div>

    <button class="export-btn" id="export-btn" disabled onclick="exportShortlist()">
      Export Shortlist (0)
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

// ─── Tier Config ─────────────────────────────────────────────────────────────

const TIERS = [
  { label: "Top 10",    color: "#FFD700", range: [1, 10],    key: "top10"    },
  { label: "11 – 50",  color: "#FF6B6B", range: [11, 50],   key: "top50"    },
  { label: "51 – 100", color: "#4ECDC4", range: [51, 100],  key: "top100"   },
  { label: "101 – 200",color: "#45B7D1", range: [101, 200], key: "top200"   },
  { label: "201 – 500",color: "#96CEB4", range: [201, 500], key: "top500"   },
  { label: "501 – 1000",color: "#C3A6D1",range: [501, 1000],key: "top1000"  },
  { label: "1000+",    color: "#94a3b8", range: [1001, Infinity], key: "top1001" },
];

function getTier(rankStr) {
  const n = parseInt(rankStr.replace(/[^\d]/g, "")) || 9999;
  return TIERS.find(t => n >= t.range[0] && n <= t.range[1]) || TIERS[TIERS.length - 1];
}

// ─── State ────────────────────────────────────────────────────────────────────

const shortlist = new Set();
let activeFilters = new Set();
let searchQuery = "";
let markers = [];
let map;
let openPopup = null;

// ─── Map Init ─────────────────────────────────────────────────────────────────

function initMap() {
  map = L.map("map", {
    center: [38.5, -96],
    zoom: 4,
    minZoom: 3,
    maxZoom: 12,
    zoomControl: true,
    maxBounds: [[-10, -180], [75, -50]],
  });

  L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
    attribution: '© <a href="https://carto.com/">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 19,
  }).addTo(map);

  buildLegend();
  buildFilterChips();
  buildMarkers();
}

// ─── Legend ───────────────────────────────────────────────────────────────────

function buildLegend() {
  const el = document.getElementById("legend");
  el.innerHTML = TIERS.map(t => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${t.color}"></div>
      <span>${t.label}</span>
    </div>
  `).join("");
}

// ─── Filter Chips ─────────────────────────────────────────────────────────────

function buildFilterChips() {
  const el = document.getElementById("filter-chips");
  el.innerHTML = TIERS.map(t => `
    <div class="filter-chip" id="chip-${t.key}"
         style="background:${t.color}22; color:${t.color};"
         onclick="toggleFilter('${t.key}')">
      ${t.label}
    </div>
  `).join("");
}

function toggleFilter(key) {
  if (activeFilters.has(key)) {
    activeFilters.delete(key);
    document.getElementById(`chip-${key}`).classList.remove("active");
  } else {
    activeFilters.add(key);
    document.getElementById(`chip-${key}`).classList.add("active");
  }
  applyFilters();
}

// ─── Markers ──────────────────────────────────────────────────────────────────

function buildMarkers() {
  markers.forEach(m => map.removeLayer(m.marker));
  markers = [];

  UNIVERSITIES.forEach(u => {
    const tier = getTier(u.rank);
    const isShortlisted = shortlist.has(u.name);

    const radius = getRankRadius(u.rank);

    const circle = L.circleMarker([u.lat, u.lng], {
      radius,
      fillColor: tier.color,
      color: isShortlisted ? "#fff" : tier.color,
      weight: isShortlisted ? 2.5 : 1,
      opacity: isShortlisted ? 1 : 0.7,
      fillOpacity: isShortlisted ? 0.95 : 0.75,
    });

    const popupContent = buildPopupHTML(u, tier, isShortlisted);
    const popup = L.popup({
      closeButton: true,
      autoClose: true,
      className: "custom-popup",
      maxWidth: 260,
      offset: [0, -4],
    }).setContent(popupContent);

    circle.bindPopup(popup);

    circle.on("mouseover", function() {
      this.setStyle({ fillOpacity: 1, weight: 2.5 });
      this.openPopup();
    });

    circle.on("mouseout", function(e) {
      const related = e.originalEvent && e.originalEvent.relatedTarget;
      if (related && related.closest && related.closest(".leaflet-popup")) return;
      this.setStyle({
        fillOpacity: shortlist.has(u.name) ? 0.95 : 0.75,
        weight: shortlist.has(u.name) ? 2.5 : 1,
      });
    });

    circle.addTo(map);
    markers.push({ marker: circle, university: u, tier });
  });

  applyFilters();
}

function getRankRadius(rankStr) {
  const n = parseInt(rankStr.replace(/[^\d]/g, "")) || 9999;
  if (n <= 10)   return 10;
  if (n <= 50)   return 8;
  if (n <= 100)  return 7;
  if (n <= 200)  return 6;
  if (n <= 500)  return 5;
  if (n <= 1000) return 4.5;
  return 4;
}

function buildPopupHTML(u, tier, isShortlisted) {
  const rankLabel = u.rank.includes("-") || parseInt(u.rank) >= 1000
    ? `Rank ${u.rank}` : `Rank #${u.rank}`;
  return `
    <div class="popup-content">
      <div class="popup-rank" style="color:${tier.color}">${rankLabel}</div>
      <div class="popup-name">${u.name}</div>
      <div class="popup-city">${u.city}, ${u.state}</div>
      <button class="popup-btn ${isShortlisted ? "remove" : "add"}"
              onclick="toggleShortlist('${u.name.replace(/'/g, "\\'")}')">
        ${isShortlisted ? "✓ Remove from Shortlist" : "+ Add to Shortlist"}
      </button>
    </div>
  `;
}

function refreshMarkerStyle(name) {
  const m = markers.find(m => m.university.name === name);
  if (!m) return;
  const isShortlisted = shortlist.has(name);
  m.marker.setStyle({
    color: isShortlisted ? "#fff" : m.tier.color,
    weight: isShortlisted ? 2.5 : 1,
    fillOpacity: isShortlisted ? 0.95 : 0.75,
  });
  // Update popup content
  m.marker.getPopup().setContent(buildPopupHTML(m.university, m.tier, isShortlisted));
}

// ─── Filtering ────────────────────────────────────────────────────────────────

function applyFilters() {
  let visible = 0;
  markers.forEach(({ marker, university, tier }) => {
    const matchesTier = activeFilters.size === 0 || activeFilters.has(tier.key);
    const q = searchQuery.toLowerCase();
    const matchesSearch = !q ||
      university.name.toLowerCase().includes(q) ||
      university.city.toLowerCase().includes(q) ||
      university.state.toLowerCase().includes(q);

    if (matchesTier && matchesSearch) {
      map.addLayer(marker);
      visible++;
    } else {
      map.removeLayer(marker);
    }
  });
  document.getElementById("visible-count").textContent = visible;
}

// ─── Shortlist ────────────────────────────────────────────────────────────────

function toggleShortlist(name) {
  if (shortlist.has(name)) {
    shortlist.delete(name);
    showToast(`Removed from shortlist`);
  } else {
    shortlist.add(name);
    showToast(`Added to shortlist`);
  }
  refreshMarkerStyle(name);
  renderShortlist();
  updateStats();
}

function clearShortlist() {
  if (shortlist.size === 0) return;
  const names = [...shortlist];
  shortlist.clear();
  names.forEach(n => refreshMarkerStyle(n));
  renderShortlist();
  updateStats();
  showToast("Shortlist cleared");
}

function renderShortlist() {
  const scroll = document.getElementById("shortlist-scroll");
  const empty = document.getElementById("shortlist-empty");
  const count = document.getElementById("shortlist-count");

  count.textContent = shortlist.size;

  if (shortlist.size === 0) {
    scroll.innerHTML = "";
    empty.style.display = "flex";
    scroll.appendChild(empty);
    document.getElementById("export-btn").disabled = true;
    document.getElementById("export-btn").textContent = "Export Shortlist (0)";
    return;
  }

  document.getElementById("export-btn").disabled = false;
  document.getElementById("export-btn").textContent = `Export Shortlist (${shortlist.size})`;

  const items = UNIVERSITIES
    .filter(u => shortlist.has(u.name))
    .sort((a, b) => {
      const ra = parseInt(a.rank.replace(/[^\d]/g, "")) || 9999;
      const rb = parseInt(b.rank.replace(/[^\d]/g, "")) || 9999;
      return ra - rb;
    });

  const html = items.map(u => {
    const tier = getTier(u.rank);
    const dot = `<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${tier.color};margin-right:4px"></span>`;
    return `
      <div class="shortlist-item">
        <div class="shortlist-rank">#${u.rank}</div>
        <div class="shortlist-info">
          <div class="shortlist-name">${dot}${u.name}</div>
          <div class="shortlist-city">${u.city}, ${u.state}</div>
        </div>
        <button class="remove-btn" onclick="toggleShortlist('${u.name.replace(/'/g, "\\'")}')" title="Remove">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    `;
  }).join("");

  scroll.innerHTML = html;
}

function updateStats() {
  document.getElementById("shortlist-stat").textContent = shortlist.size;
}

// ─── Export ───────────────────────────────────────────────────────────────────

function exportShortlist() {
  const items = UNIVERSITIES
    .filter(u => shortlist.has(u.name))
    .sort((a, b) => {
      const ra = parseInt(a.rank.replace(/[^\d]/g, "")) || 9999;
      const rb = parseInt(b.rank.replace(/[^\d]/g, "")) || 9999;
      return ra - rb;
    });

  const csv = ["Rank,University,City,State"]
    .concat(items.map(u => `"${u.rank}","${u.name}","${u.city}","${u.state}"`))
    .join("\n");

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "university_shortlist.csv";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Shortlist exported as CSV");
}

// ─── Toast ────────────────────────────────────────────────────────────────────

let toastTimer;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 2000);
}

// ─── Search ───────────────────────────────────────────────────────────────────

document.getElementById("search-input").addEventListener("input", e => {
  searchQuery = e.target.value;
  applyFilters();
});

// ─── Boot ─────────────────────────────────────────────────────────────────────

window.addEventListener("DOMContentLoaded", initMap);
</script>
