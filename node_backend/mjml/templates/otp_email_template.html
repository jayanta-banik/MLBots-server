<!doctype html>
<html lang="en">
  <body
    style="
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f4ec;
      color: #1d2520;
    "
  >
    <table
      role="presentation"
      width="100%"
      cellpadding="0"
      cellspacing="0"
      style="padding: 24px; background: #f7f4ec"
    >
      <tr>
        <td align="center">
          <table
            role="presentation"
            width="100%"
            cellpadding="0"
            cellspacing="0"
            style="
              max-width: 560px;
              background: #fffdf8;
              border: 1px solid #d7ddd8;
              border-radius: 18px;
              padding: 32px;
            "
          >
            <tr>
              <td>
                <p
                  style="
                    margin: 0 0 12px;
                    font-size: 12px;
                    letter-spacing: 2px;
                    text-transform: uppercase;
                    color: #17253d;
                  "
                >
                  MLBots account verification
                </p>
                <h1 style="margin: 0 0 12px; font-size: 28px; line-height: 1.2">
                  Verify your email
                </h1>
                <p style="margin: 0 0 20px; font-size: 16px; line-height: 1.6">
                  Hi {{firstName}}, use the code below to finish creating your
                  account for {{email}}.
                </p>
                <div
                  style="
                    margin: 0 0 20px;
                    padding: 18px 20px;
                    border-radius: 12px;
                    background: #edf2ee;
                    border: 1px solid #c7d4cb;
                    font-size: 32px;
                    font-weight: 700;
                    letter-spacing: 10px;
                    text-align: center;
                  "
                >
                  {{otp}}
                </div>
                <p
                  style="
                    margin: 0;
                    font-size: 14px;
                    line-height: 1.6;
                    color: #56615a;
                  "
                >
                  This code expires in 10 minutes. If you did not try to create
                  an account, you can ignore this message.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
