openapi: 3.1.0
info:
  title: Welcome Auth Home API
  version: 1.0.0
  description: Minimal auth and profile contract required for the Welcome/Home feature.
servers:
  - url: /api/node
paths:
  /auth/signup:
    post:
      summary: Register a new user account for the Welcome/Home flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
      responses:
        '201':
          description: Signup succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error.
        '409':
          description: Duplicate email or conflicting signup identity.
  /auth/login:
    post:
      summary: Authenticate an existing user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error.
        '401':
          description: Invalid credentials.
  /auth/me:
    get:
      summary: Return the authenticated user profile needed for Home.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current authenticated user summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Missing or invalid token.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SignupRequest:
      type: object
      required:
        - email
        - firstName
        - password
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
    AuthResponse:
      type: object
      required:
        - token
        - user
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/UserProfile'
    UserProfile:
      type: object
      required:
        - id
        - email
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true